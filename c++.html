<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>150 Días · Para mi niña ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #F8F3EB;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            color: #4a3f35;
            -webkit-tap-highlight-color: transparent;
        }

        .contenedor-principal {
            display: flex;
            flex-direction: row;
            width: 90%;
            max-width: 1100px;
            height: 85vh;
            position: relative;
        }

        .seccion-texto {
            width: 40%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 40px 25px 30px;
            z-index: 10;
            position: relative;
        }

        .texto-top {
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 1.2s ease, transform 1.2s ease;
            margin-bottom: 20px;
        }

        .mostrar-texto {
            opacity: 1 !important;
            transform: translateY(0) !important;
        }

        .ocultar {
            opacity: 0 !important;
            pointer-events: none;
            transition: opacity 0.6s ease;
        }

        .texto-top h1 {
            font-size: 2rem;
            font-weight: 300;
            color: #5C4A42;
            margin: 0;
            line-height: 1.4;
        }

        .texto-top h1 .letra {
            display: inline-block;
            opacity: 0;
            transform: translateY(15px);
            transition: opacity 0.4s ease, transform 0.4s ease;
        }

        .texto-top h1 .letra.visible-letra {
            opacity: 1;
            transform: translateY(0);
        }

        /* Contenedor de la carta, aparece entre el título y el contador */
        .carta-contenedor {
            display: none;
            flex-direction: column;
            flex: 1;
            overflow-y: auto;
            padding-right: 10px;
            scroll-behavior: smooth;
            font-family: 'Dancing Script', cursive;
            font-size: 1.3rem;
            line-height: 1.8;
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 1.2s ease, transform 1.2s ease;
        }

        .carta-contenedor.mostrar-texto {
            opacity: 1;
            transform: translateY(0);
        }

        .carta-parte {
            opacity: 0;
            transform: translateY(10px);
            transition: opacity 0.8s ease, transform 0.8s ease;
            color: #4a3f35;
        }

        .carta-parte.activa {
            opacity: 1;
            transform: translateY(0);
        }

        .mensaje-final {
            font-size: 1.5rem;
            color: #e63946;
            font-weight: 600;
            text-align: center;
            margin-top: 20px;
            opacity: 0;
            transform: scale(0.9);
            transition: opacity 1s ease, transform 1s ease;
            font-family: 'Dancing Script', cursive;
        }

        .mensaje-final.visible {
            opacity: 1;
            transform: scale(1);
        }

        /* Sección inferior fija: contador + toca continuar */
        .seccion-inferior {
            margin-top: auto;
            text-align: center;
        }

        .texto-bottom {
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 1.2s ease, transform 1.2s ease;
        }

        .texto-bottom.mostrar-texto {
            opacity: 1;
            transform: translateY(0);
        }

        .texto-bottom p {
            font-size: 1.3rem;
            color: #5C4A42;
            margin-bottom: 10px;
        }

        .contador-tiempo {
            font-size: 1.8rem;
            font-weight: bold;
            color: #5C4A42;
            display: flex;
            align-items: baseline;
            gap: 5px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .contador-tiempo span {
            font-size: 1rem;
            font-weight: normal;
            margin-right: 12px;
            animation: brilloSuave 3s infinite;
        }

        @keyframes brilloSuave {
            0%, 100% { color: #5C4A42; }
            50% { color: #e63946; }
        }

        .toca-continuar {
            margin-top: 15px;
            font-size: 1rem;
            color: #e63946;
            opacity: 0;
            transition: opacity 0.8s ease;
            cursor: pointer;
            animation: flotarSuave 2s infinite alternate;
        }

        .toca-continuar.visible {
            opacity: 1;
        }

        @keyframes flotarSuave {
            0% { transform: translateY(0); }
            100% { transform: translateY(-5px); }
        }

        /* Escenario */
        .escenario {
            width: 60%;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            padding-bottom: 80px;
        }

        .suelo {
            position: absolute;
            bottom: 80px;
            width: 70%;
            height: 3px;
            background-color: #2c2c2c;
            border-radius: 2px;
            z-index: 0;
        }

        .indicador {
            position: absolute;
            top: 18%;
            font-size: 1.2rem;
            color: #e63946;
            animation: flotar 1.5s infinite alternate;
            transition: opacity 0.5s ease;
            cursor: pointer;
            text-align: center;
            z-index: 50;
            font-weight: 500;
        }

        @keyframes flotar {
            0% { transform: translateY(0); }
            100% { transform: translateY(-14px); }
        }

        .corazon-inicio {
            position: absolute;
            top: 28%;
            font-size: 50px;
            color: #e63946;
            cursor: pointer;
            z-index: 50;
            filter: drop-shadow(0 8px 14px rgba(230, 57, 70, 0.5));
            animation: latido 0.9s infinite alternate;
            transition: top 1.1s cubic-bezier(0.55, 0.085, 0.68, 0.53), opacity 0.5s ease;
        }

        @keyframes latido {
            0% { transform: scale(1); }
            100% { transform: scale(1.22); }
        }

        .contenedor-arbol {
            position: absolute;
            bottom: 83px;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 5;
        }

        .tronco {
            width: 22px;
            height: 0px;
            background: linear-gradient(to right, #5a3e2b, #8B5A2B, #5a3e2b);
            border-radius: 5px 5px 0 0;
            position: relative;
            z-index: 2;
            box-shadow: 0 0 10px rgba(0,0,0,0.25);
            transition: height 1s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .tronco.crecer-tronco { height: 240px; }

        .rama {
            position: absolute;
            width: 7px;
            height: 0px;
            background: #6b4423;
            border-radius: 3px;
            transform-origin: bottom center;
            transition: height 0.7s ease-out, opacity 0.5s ease;
            opacity: 0;
            z-index: 1;
        }

        .rama.izquierda  { left: -3px;  transform: rotate(-38deg); }
        .rama.derecha    { right: -3px; transform: rotate(38deg); }
        .rama.izquierda2 { left: -5px;  transform: rotate(-58deg); }
        .rama.derecha2   { right: -5px; transform: rotate(58deg); }

        .rama.crecer-rama       { height: 75px; opacity: 1; }
        .rama.crecer-rama-larga { height: 95px; opacity: 1; }

        .copa-arbol {
            position: absolute;
            width: 10px;
            height: 10px;
            z-index: 10;
            pointer-events: none;
            animation: balanceo 6s ease-in-out infinite;
        }

        @keyframes balanceo {
            0%, 100% { transform: translate(-50%, -50%) rotate(0deg); }
            25% { transform: translate(-50%, -50%) rotate(1.5deg); }
            75% { transform: translate(-50%, -50%) rotate(-1.5deg); }
        }

        .hoja-corazon {
            position: absolute;
            opacity: 0;
            transform: scale(0) rotate(var(--rot));
            transition: transform 0.45s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.25s ease;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.25));
            pointer-events: none;
        }

        .hoja-corazon.visible {
            opacity: 1;
            transform: scale(1) rotate(var(--rot));
        }

        .corazon-cayendo {
            position: absolute;
            z-index: 15;
            pointer-events: none;
            animation: caerFlotando var(--duracion) ease-in forwards;
            opacity: 0.9;
        }

        @keyframes caerFlotando {
            0% { transform: translate(0, 0) rotate(0deg) scale(1); opacity: 0.9; }
            30% { transform: translate(var(--desvioX), 60px) rotate(var(--giro)) scale(0.95); opacity: 0.85; }
            70% { transform: translate(calc(var(--desvioX) * 2.5), 180px) rotate(calc(var(--giro) * 2)) scale(0.8); opacity: 0.5; }
            100% { transform: translate(calc(var(--desvioX) * 4), 340px) rotate(calc(var(--giro) * 3)) scale(0.3); opacity: 0; }
        }

        .desaparecer { opacity: 0 !important; pointer-events: none; }

        @media (max-width: 768px) {
            body { overflow-y: auto; align-items: flex-start; }
            .contenedor-principal { flex-direction: column; height: auto; align-items: center; }
            .escenario { width: 100%; height: 520px; padding-bottom: 60px; }
            .suelo { bottom: 60px; }
            .contenedor-arbol { bottom: 63px; }
            .tronco.crecer-tronco { height: 200px !important; }
            .seccion-texto { width: 90%; padding: 25px 10px; text-align: left; }
            .texto-top h1 { font-size: 1.6rem; text-align: center; margin-bottom: 20px; }
            .texto-bottom p { text-align: center; font-size: 1.1rem; }
            .contador-tiempo { justify-content: center; font-size: 1.3rem; }
            .carta-contenedor { font-size: 1.1rem; }
        }
    </style>
</head>
<body>

    <div class="contenedor-principal">
        
        <div class="seccion-texto" id="seccionTexto">
            <!-- Título que se oculta al iniciar carta -->
            <div id="textoTop" class="texto-top">
                <h1 id="tituloAmor">Para el amor de mi vida:</h1>
            </div>

            <!-- La carta ocupará este espacio -->
            <div id="cartaContenedor" class="carta-contenedor"></div>

            <!-- Contador y mensaje "toca para continuar" siempre abajo -->
            <div class="seccion-inferior">
                <div id="textoBottom" class="texto-bottom">
                    <p>Mi amor por ti comenzó hace...</p>
                    <div class="contador-tiempo" id="contador">
                        0 <span>días</span> 0 <span>horas</span> 0 <span>minutos</span> 0 <span>segundos</span>
                    </div>
                </div>
                <div id="tocaContinuar" class="toca-continuar">✨ Toca la pantalla para continuar ✨</div>
            </div>
        </div>

        <div class="escenario" id="escenario">
            <div class="suelo"></div>
            <div id="txtIndicador" class="indicador" onclick="iniciarMagia()">💛 Toca el corazoncito 💛</div>
            <div id="corazonClick" class="corazon-inicio" onclick="iniciarMagia()">❤️</div>
            <div id="contenedorArbol" class="contenedor-arbol">
                <div id="troncoArbol" class="tronco">
                    <div class="rama izquierda" id="rama1"></div>
                    <div class="rama derecha" id="rama2"></div>
                    <div class="rama izquierda2" id="rama3"></div>
                    <div class="rama derecha2" id="rama4"></div>
                </div>
            </div>
            <div id="copaArbol" class="copa-arbol"></div>
        </div>
    </div>

    <script>
        // ===================== CONFIGURACIÓN =====================
        const fechaInicio = new Date("2026-01-26T13:02:00"); // 26 enero 2026, 1:02 PM

        // PARTES DE LA CARTA (¡personaliza aquí!)
        const partesCarta = [
            `Mi niña hermosa,\n\nHoy cumplimos 150 días de esta historia que empezó casi sin querer y se volvió el centro de mi universo.`,
            `Recuerdo el primer mensaje, esa sonrisa que imaginé detrás de la pantalla, y cómo supe que algo dentro de mí había cambiado para siempre.`,
            `Cada día a tu lado (aunque sea en la distancia) me has enseñado lo que es querer sin medidas, reír hasta que duela el alma y soñar con un futuro donde tú y yo seamos el "para siempre".`,
            `Gracias por ser mi paz, mi caos favorito, mi ganas de ser mejor. Eres el amor de mi vida, y apenas estamos empezando.`,
            `Hoy quiero pedirte que sigamos escribiendo juntos esta historia, con tinta de besos y páginas de abrazos. Te amo.`
        ];

        let magiaIniciada = false;
        let intervaloGoteo = null;
        let parteActual = -1;
        const tocaContinuar = document.getElementById("tocaContinuar");
        const cartaContenedor = document.getElementById("cartaContenedor");
        const textoTop = document.getElementById("textoTop");
        const textoBottom = document.getElementById("textoBottom");

        function iniciarMagia() {
            if (magiaIniciada) return;
            magiaIniciada = true;

            const indicador = document.getElementById("txtIndicador");
            const corazon = document.getElementById("corazonClick");
            const tronco = document.getElementById("troncoArbol");
            const rama1 = document.getElementById("rama1");
            const rama2 = document.getElementById("rama2");
            const rama3 = document.getElementById("rama3");
            const rama4 = document.getElementById("rama4");
            const copa = document.getElementById("copaArbol");
            const escenario = document.getElementById("escenario");

            indicador.classList.add("desaparecer");
            setTimeout(() => indicador.style.display = "none", 500);

            corazon.classList.add("caer");

            setTimeout(() => {
                corazon.classList.add("desaparecer");
                tronco.classList.add("crecer-tronco");
            }, 850);

            setTimeout(() => {
                rama1.classList.add("crecer-rama");
                rama2.classList.add("crecer-rama");
            }, 1500);
            setTimeout(() => {
                rama3.classList.add("crecer-rama-larga");
                rama4.classList.add("crecer-rama-larga");
            }, 1800);

            setTimeout(() => {
                const troncoRect = tronco.getBoundingClientRect();
                const escenarioRect = escenario.getBoundingClientRect();
                const copaX = troncoRect.left + troncoRect.width/2 - escenarioRect.left;
                const copaY = troncoRect.top - escenarioRect.top;
                
                copa.style.left = copaX + 'px';
                copa.style.top = copaY + 'px';
                
                generarCopaDensa(copa);
            }, 1900);

            setTimeout(() => {
                mostrarTextosConAnimacion();
            }, 4500);

            setTimeout(() => {
                iniciarGoteoCorazones(copa, escenario);
            }, 6000);

            setTimeout(() => {
                tocaContinuar.classList.add('visible');
                tocaContinuar.addEventListener('click', iniciarCarta);
                // También al tocar en cualquier parte de la sección (excepto la carta)
                document.getElementById('seccionTexto').addEventListener('click', function(e) {
                    if (parteActual === -1 && tocaContinuar.classList.contains('visible')) {
                        iniciarCarta();
                    }
                });
            }, 8000);
        }

        function generarCopaDensa(contenedor) {
            const coloresInterior = [
                '#FF4757', '#FF6B81', '#FF3344', '#FF5068', 
                '#FF2255', '#FD79A8', '#FF1493', '#FF5E72',
                '#FF3B5C', '#FF5577', '#E63946', '#FF4060'
            ];
            const escala = 10.5;
            const paso = 0.55;
            const rango = 1.25;
            const posiciones = [];

            for (let y = -rango; y <= rango; y += paso / escala) {
                for (let x = -rango; x <= rango; x += paso / escala) {
                    const valor = Math.pow(x*x + y*y - 1, 3) - x*x * y*y*y;
                    if (valor <= 0.08) {
                        const px = x * escala * 16;
                        const py = -y * escala * 13;
                        posiciones.push({
                            x: px,
                            y: py,
                            distCentro: Math.sqrt(x*x + y*y)
                        });
                    }
                }
            }

            posiciones.sort((a, b) => a.distCentro - b.distCentro);

            posiciones.forEach((pos, index) => {
                const hoja = document.createElement('div');
                hoja.innerHTML = '♥';
                hoja.className = 'hoja-corazon';
                const tamanio = Math.random() * 9 + 9;
                const color = coloresInterior[Math.floor(Math.random() * coloresInterior.length)];
                const rotacion = Math.random() * 35 - 17;
                const retraso = index * 8;

                hoja.style.left = `calc(50% + ${pos.x}px)`;
                hoja.style.top = `calc(50% + ${pos.y}px)`;
                hoja.style.color = color;
                hoja.style.fontSize = `${tamanio}px`;
                hoja.style.setProperty('--rot', `${rotacion}deg`);
                hoja.style.transitionDelay = `${retraso}ms`;

                contenedor.appendChild(hoja);
                setTimeout(() => hoja.classList.add('visible'), retraso + 40);
            });
        }

        function iniciarGoteoCorazones(copa, escenario) {
            const coloresGoteo = ['#c0392b', '#e74c3c', '#ff2d55', '#d63031', '#b71540', '#ff4757', '#e63946'];
            function soltarCorazoncito() {
                if (!magiaIniciada) return;
                const corazoncito = document.createElement('div');
                corazoncito.innerHTML = '♥';
                corazoncito.className = 'corazon-cayendo';
                const copaRect = copa.getBoundingClientRect();
                const escenarioRect = escenario.getBoundingClientRect();
                // offsetX más amplio para que salgan hacia los costados
                const offsetX = (Math.random() - 0.5) * 200;
                const offsetY = (Math.random() - 0.5) * 100;
                const inicioX = copaRect.left - escenarioRect.left + copaRect.width/2 + offsetX;
                const inicioY = copaRect.top - escenarioRect.top + copaRect.height/2 + offsetY;
                
                corazoncito.style.left = inicioX + 'px';
                corazoncito.style.top = inicioY + 'px';
                corazoncito.style.color = coloresGoteo[Math.floor(Math.random() * coloresGoteo.length)];
                corazoncito.style.fontSize = (Math.random() * 12 + 12) + 'px';
                corazoncito.style.setProperty('--desvioX', (Math.random() - 0.5) * 100 + 'px');
                corazoncito.style.setProperty('--giro', (Math.random() * 200 - 100) + 'deg');
                corazoncito.style.setProperty('--duracion', (Math.random() * 2.5 + 3) + 's');
                
                escenario.appendChild(corazoncito);
                const duracion = parseFloat(corazoncito.style.getPropertyValue('--duracion')) * 1000;
                setTimeout(() => { if (corazoncito.parentNode) corazoncito.remove(); }, duracion + 100);
            }
            intervaloGoteo = setInterval(soltarCorazoncito, 1500);
            soltarCorazoncito();
        }

        function mostrarTextosConAnimacion() {
            const titulo = document.getElementById("tituloAmor");
            const textoOriginal = "Para el amor de mi vida:";
            titulo.innerHTML = '';
            for (let i = 0; i < textoOriginal.length; i++) {
                const span = document.createElement('span');
                span.className = 'letra';
                span.textContent = textoOriginal[i] === ' ' ? '\u00A0' : textoOriginal[i];
                titulo.appendChild(span);
            }
            textoTop.classList.add("mostrar-texto");
            const letras = titulo.querySelectorAll('.letra');
            letras.forEach((letra, index) => {
                setTimeout(() => letra.classList.add('visible-letra'), index * 60);
            });
            setTimeout(() => {
                textoBottom.classList.add("mostrar-texto");
            }, letras.length * 60 + 600);
        }

        function iniciarCarta() {
            if (parteActual !== -1) return;
            parteActual = 0;
            // Ocultar solo el título, el contador permanece visible abajo
            textoTop.classList.add("ocultar");
            tocaContinuar.classList.remove("visible");
            tocaContinuar.style.display = "none";
            
            cartaContenedor.style.display = "flex";
            setTimeout(() => cartaContenedor.classList.add("mostrar-texto"), 100);
            mostrarParte(parteActual);
            
            document.body.addEventListener('click', avanzarCarta);
        }

        function avanzarCarta() {
            if (parteActual >= partesCarta.length) return;
            const parteActiva = cartaContenedor.querySelector('.carta-parte.activa');
            if (parteActiva) {
                parteActiva.classList.remove('activa');
                parteActual++;
                setTimeout(() => mostrarParte(parteActual), 600);
            } else if (parteActual === 0) {
                mostrarParte(0);
            }
        }

        function mostrarParte(indice) {
            cartaContenedor.innerHTML = '';
            if (indice >= partesCarta.length) {
                const final = document.createElement('div');
                final.className = 'mensaje-final';
                final.innerHTML = '❤️ Gracias por estos 150 días, mi amor.<br>Continuará por toda la eternidad.';
                cartaContenedor.appendChild(final);
                setTimeout(() => final.classList.add('visible'), 50);
                document.body.removeEventListener('click', avanzarCarta);
                return;
            }
            
            const parteDiv = document.createElement('div');
            parteDiv.className = 'carta-parte';
            parteDiv.innerHTML = partesCarta[indice].replace(/\n/g, '<br>');
            cartaContenedor.appendChild(parteDiv);
            setTimeout(() => parteDiv.classList.add('activa'), 50);
        }

        function actualizarContador() {
            const ahora = new Date();
            const diferencia = ahora - fechaInicio;
            if (diferencia > 0) {
                const dias = Math.floor(diferencia / (1000 * 60 * 60 * 24));
                const horas = Math.floor((diferencia % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const minutos = Math.floor((diferencia % (1000 * 60 * 60)) / (1000 * 60));
                const segundos = Math.floor((diferencia % (1000 * 60)) / 1000);
                document.getElementById("contador").innerHTML = 
                    `${dias} <span>días</span> ${horas} <span>horas</span> ${minutos} <span>minutos</span> ${segundos} <span>segundos</span>`;
            }
        }

        setInterval(actualizarContador, 1000);
        actualizarContador();
    </script>
</body>
</html>
